<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f8fb;
      padding: 24px;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d6e0ea;
      border-radius: 14px;
      padding: 24px;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
    }
    .btn.secondary {
      background: #334155;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>SUDOKU</h1>
    <div class="actions">
      <a class="btn secondary" href="{{ url_for('main.games') }}">Starta ny Sudoku</a>
      <a class="btn secondary" href="{{ url_for('main.ongoing_games') }}">Visa pågående spel</a>
      <a class="btn" href="{{ url_for('main.builder') }}">Lägg in nytt Sudoku</a>
    </div>
  </main>
</body>
</html>
